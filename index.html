<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>بوابة نتائج المرضى</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .container {
      background-color: #ffffff; padding: 30px; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center;
    }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    input[type="text"], input[type="tel"] {
      width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc;
      border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center;
    }
    button {
      background-color: #3498db; color: white; border: none; padding: 12px 20px;
      border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%;
    }
    #resultBox { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: right; }
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .pending { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .buttons-container {
      display: flex; gap: 10px; margin-top: 15px;
    }
    .btn-action {
      flex: 1; text-align: center; padding: 10px; border-radius: 6px; 
      color: white; text-decoration: none; font-weight: bold; font-size: 14px;
    }
    .btn-view { background-color: #17a2b8; }
    .btn-download { background-color: #28a745; }
  </style>
</head>
<body>
  <div class="container">
    <h2>نتائج المختبر 🏥</h2>
    <input type="text" id="patientCode" placeholder="أدخل كود المريض (مثال: 1023)">
    <input type="tel" id="patientPhone" placeholder="أدخل رقم الهاتف للتحقق">
    <button id="searchBtn">استعلام</button>
    <div id="loading" style="display:none; margin-top:15px; color:#7f8c8d;">جاري البحث... ⏳</div>
    <div id="resultBox"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
